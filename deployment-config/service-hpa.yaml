apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-app-hpa
  namespace: homeassignment

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-app

  minReplicas: 4
  maxReplicas: 6

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80